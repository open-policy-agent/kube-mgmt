version: v2beta1
name: kube-mgmt

vars:
  DEVSPACE_FLAGS: "-n default --no-warn"

images:
  default:
    image: localhost:5001/openpolicyagent/kube-mgmt
    buildArgs:
      VERSION: ${runtime.images.default.tag}
      COMMIT: ${DEVSPACE_GIT_COMMIT}
    tags:
      - $(git describe --tags --always --dirty)
    buildKit:
      args:
        - "--platform=linux/amd64"

deployments:
  default:
    namespace: default
    helm:
      releaseName: ${DEVSPACE_NAME}
      chart:
        path: charts/opa-kube-mgmt
      values:
        e2e: true
        mgmt:
          image:
            repository: ${runtime.images.default.image}
            tag: ${runtime.images.default.tag}
      valuesFiles:
        - "${E2E_TEST}/values.yaml"
      upgradeArgs:
        - "--wait"
        - "--install"

hooks:
  - name: "helm package"
    events: ["after:build:default"]
    disabled: true
    command: |
      helm package charts/opa-kube-mgmt --version ${runtime.images.default.tag} --app-version ${runtime.images.default.tag}
  - name: "tag image as latest"
    events: ["after:build:default"]
    disabled: true
    command: |
      oras tag "docker.io/${runtime.images.default.image}:${runtime.images.default.tag}" latest
  - name: "e2e cleanup"
    events: ["before:deploy:default"]
    command: |
      kubectl delete cm -l kube-mgmt/e2e=true -n ${DEVSPACE_NAMESPACE} --ignore-not-found
      kubectl delete svc -l kube-mgmt/e2e=true -n ${DEVSPACE_NAMESPACE} --ignore-not-found

profiles:
  - name: release
    patches:
      - op: replace
        path: images.default.image
        value: openpolicyagent/kube-mgmt
      - op: replace
        path: images.default.buildKit.args[0]
        value: "--platform=linux/amd64,linux/arm64"
      - op: replace
        path: hooks[0].disabled
        value: false
      - op: replace
        path: hooks[1].disabled
        value: false
